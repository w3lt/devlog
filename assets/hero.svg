<svg width="860" height="552" viewBox="0 0 860 552" fill="none" xmlns="http://www.w3.org/2000/svg" font-family="'SF Mono','Cascadia Code','JetBrains Mono','Fira Code',Menlo,Consolas,monospace">
  <defs>
    <linearGradient id="sheen" x1="250" y1="0" x2="610" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f59e0b"/>
      <stop offset="0.30" stop-color="#ec4899"/>
      <stop offset="0.55" stop-color="#8b5cf6"/>
      <stop offset="0.80" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#f59e0b"/>
      <animateTransform attributeName="gradientTransform" type="translate"
        values="-110 0; 110 0; -110 0" dur="9s" repeatCount="indefinite"
        calcMode="spline" keyTimes="0;0.5;1" keySplines="0.45 0 0.55 1;0.45 0 0.55 1"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Title -->
  <text x="430" y="78" text-anchor="middle" font-size="60" font-weight="700"
        letter-spacing="2" fill="url(#sheen)">devlog</text>
  <text x="430" y="114" text-anchor="middle" font-size="17" letter-spacing="0.5"
        fill="#768390">a tiny developer journal that lives in your terminal</text>

  <!-- Terminal window -->
  <rect x="40" y="150" width="780" height="372" rx="14" fill="#0d1117" stroke="#272d38" stroke-width="1"/>
  <rect x="40" y="150" width="780" height="38" rx="14" fill="#161b22"/>
  <rect x="40" y="174" width="780" height="14" fill="#161b22"/>
  <circle cx="66" cy="169" r="6" fill="#ff5f56"/>
  <circle cx="86" cy="169" r="6" fill="#ffbd2e"/>
  <circle cx="106" cy="169" r="6" fill="#27c93f"/>
  <text x="430" y="174" text-anchor="middle" font-size="13" fill="#6b7280">devlog — session</text>

  <!-- Terminal content -->
  <g font-size="15">
    <!-- line 1: add command -->
    <g opacity="0">
      <animate attributeName="opacity" dur="13s" repeatCount="indefinite"
        keyTimes="0;0.04;0.06;0.92;1" values="0;0;1;1;0"/>
      <text x="70" y="222" fill="#e6edf3"><tspan fill="#3fb950">$ </tspan><tspan fill="#79c0ff">devlog</tspan> add <tspan fill="#a5d6ff">"Ship the new auth flow"</tspan></text>
    </g>
    <!-- line 2: response -->
    <g opacity="0">
      <animate attributeName="opacity" dur="13s" repeatCount="indefinite"
        keyTimes="0;0.10;0.12;0.92;1" values="0;0;1;1;0"/>
      <text x="70" y="248" fill="#7d8590">Added item <tspan fill="#a5d6ff">"Ship the new auth flow"</tspan>!</text>
    </g>
    <!-- line 3: add command -->
    <g opacity="0">
      <animate attributeName="opacity" dur="13s" repeatCount="indefinite"
        keyTimes="0;0.20;0.22;0.92;1" values="0;0;1;1;0"/>
      <text x="70" y="300" fill="#e6edf3"><tspan fill="#3fb950">$ </tspan><tspan fill="#79c0ff">devlog</tspan> add <tspan fill="#a5d6ff">"Fix flaky test in store.rs"</tspan></text>
    </g>
    <!-- line 4: response -->
    <g opacity="0">
      <animate attributeName="opacity" dur="13s" repeatCount="indefinite"
        keyTimes="0;0.26;0.28;0.92;1" values="0;0;1;1;0"/>
      <text x="70" y="326" fill="#7d8590">Added item <tspan fill="#a5d6ff">"Fix flaky test in store.rs"</tspan>!</text>
    </g>
    <!-- line 5: list command -->
    <g opacity="0">
      <animate attributeName="opacity" dur="13s" repeatCount="indefinite"
        keyTimes="0;0.38;0.40;0.92;1" values="0;0;1;1;0"/>
      <text x="70" y="378" fill="#e6edf3"><tspan fill="#3fb950">$ </tspan><tspan fill="#79c0ff">devlog</tspan> list</text>
    </g>
    <!-- line 6: list output -->
    <g opacity="0">
      <animate attributeName="opacity" dur="13s" repeatCount="indefinite"
        keyTimes="0;0.45;0.47;0.92;1" values="0;0;1;1;0"/>
      <text x="70" y="404"><tspan fill="#6e7681">[2026-06-23 09:14 UTC] </tspan><tspan fill="#bc8cff">0190a1b2 </tspan><tspan fill="#e6edf3">Ship the new auth flow</tspan></text>
    </g>
    <!-- line 7: list output -->
    <g opacity="0">
      <animate attributeName="opacity" dur="13s" repeatCount="indefinite"
        keyTimes="0;0.52;0.54;0.92;1" values="0;0;1;1;0"/>
      <text x="70" y="430"><tspan fill="#6e7681">[2026-06-23 11:02 UTC] </tspan><tspan fill="#bc8cff">0190a3c4 </tspan><tspan fill="#e6edf3">Fix flaky test in store.rs</tspan></text>
    </g>
    <!-- prompt + blinking caret -->
    <text x="70" y="482" fill="#3fb950">$ </text>
    <rect x="88" y="469" width="9" height="17" fill="#e6edf3">
      <animate attributeName="opacity" values="1;1;0;0;1" keyTimes="0;0.45;0.5;0.95;1" dur="1.05s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>
